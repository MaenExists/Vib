<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 15px;
      font-family: 'Inter', sans-serif;
      background: #111;
      color: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
    }
    .status.disabled {
      background: rgba(255, 69, 58, 0.1);
      color: #ff453a;
    }
    .toggle-btn {
      width: 100%;
      padding: 10px;
      background: #333;
      border: 1px solid #444;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .toggle-btn:hover { background: #444; }
    .shortcut-list { margin-top: 15px; font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <div style="display: flex; align-items: center; gap: 8px;">
      <img src="icon.svg" width="20" height="20">
      <span style="font-weight: bold; font-size: 16px;">Vib</span>
    </div>
    <span id="status-badge" class="status">Active</span>
  </div>
  <button id="toggle-btn" class="toggle-btn">Disable Vib</button>
  <div class="shortcut-list">
    <div>Ctrl+Space: Search</div>
    <div>j / k: Scroll</div>
    <div>? : Guide</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
