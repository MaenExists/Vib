<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Vib</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000 url('https://images5.alphacoders.com/108/thumb-1920-1085969.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      overflow: hidden;
      color: white;
    }
    
    .overlay-vignette {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
      z-index: 0;
    }

    .top-bar {
      position: absolute;
      top: 30px;
      right: 40px;
      z-index: 10;
    }

    .settings-trigger {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      color: rgba(255, 255, 255, 0.6);
    }

    .settings-trigger:hover {
      background: rgba(255, 255, 255, 0.15);
      color: var(--vib-accent);
      transform: rotate(90deg);
    }

    .vib-hero {
      position: relative;
      text-align: center;
      z-index: 1;
      width: 100%;
      max-width: 800px;
      padding: 60px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 48px;
      box-shadow: 0 50px 120px rgba(0,0,0,0.6);
    }

    .vib-time {
      font-size: 100px;
      font-weight: 200;
      margin-bottom: 0px;
      letter-spacing: -4px;
      opacity: 0.95;
    }

    .vib-date {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 50px;
      opacity: 0.4;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .vib-newtab-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 24px 36px;
      color: white;
      font-size: 1.5rem;
      outline: none;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      box-sizing: border-box;
      text-align: center;
    }

    .vib-newtab-input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--vib-accent);
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
    }

    .keyboard-assets {
      margin-top: 50px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
    }

    .asset-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 16px 22px;
      border-radius: 16px;
      min-width: 110px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .asset-card:hover, .asset-card.active {
      background: rgba(0, 255, 136, 0.1);
      border-color: var(--vib-accent);
      transform: translateY(-6px);
    }

    .asset-key {
      display: block;
      font-size: 10px;
      font-weight: 900;
      color: var(--vib-accent);
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .asset-name {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.7;
    }

    .hint-bar {
      position: absolute;
      bottom: 30px;
      font-size: 11px;
      opacity: 0.25;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="overlay-vignette"></div>
  
  <div class="top-bar">
    <div class="settings-trigger" id="open-settings-btn" title="Vib Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </div>
  </div>

  <div class="vib-hero">
    <div id="clock" class="vib-time">00:00</div>
    <div id="date" class="vib-date">Monday, April 8</div>
    
    <input type="text" class="vib-newtab-input" placeholder="Search or Jump..." autofocus spellcheck="false">
    
    <div class="keyboard-assets" id="assets-container">
      <!-- Minimalist Assets Only -->
    </div>
  </div>

  <div class="hint-bar">Number keys to jump • ? for guide</div>

  <script src="newtab.js"></script>
</body>
</html>
