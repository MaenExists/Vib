<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Vib</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000 url('https://images5.alphacoders.com/108/thumb-1920-1085969.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      overflow: hidden;
      color: white;
    }
    
    .overlay-vignette {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
      z-index: 0;
    }

    .vib-hero {
      position: relative;
      text-align: center;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    }

    .vib-time {
      font-size: 80px;
      font-weight: 200;
      margin-bottom: 10px;
      letter-spacing: -2px;
      opacity: 0.9;
    }

    .vib-date {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 40px;
      opacity: 0.6;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .vib-newtab-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 20px 28px;
      color: white;
      font-size: 1.3rem;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .vib-newtab-input:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--vib-accent);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }

    .keyboard-assets {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .asset-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 16px;
      text-align: center;
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .asset-card:hover, .asset-card.active {
      background: rgba(0, 255, 136, 0.1);
      border-color: var(--vib-accent);
      transform: translateY(-5px);
    }

    .asset-key {
      display: block;
      font-size: 10px;
      font-weight: 800;
      color: var(--vib-accent);
      margin-bottom: 8px;
      opacity: 0.8;
      text-transform: uppercase;
    }

    .asset-name {
      font-size: 14px;
      font-weight: 500;
    }

    .hint-bar {
      position: absolute;
      bottom: 30px;
      font-size: 12px;
      opacity: 0.4;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="overlay-vignette"></div>
  
  <div class="vib-hero">
    <div id="clock" class="vib-time">00:00</div>
    <div id="date" class="vib-date">Monday, April 8</div>
    
    <input type="text" class="vib-newtab-input" placeholder="Type to search or jump..." autofocus spellcheck="false">
    
    <div class="keyboard-assets">
      <a href="https://github.com" class="asset-card" data-key="g">
        <span class="asset-key">Alt + G</span>
        <span class="asset-name">GitHub</span>
      </a>
      <a href="https://youtube.com" class="asset-card" data-key="y">
        <span class="asset-key">Alt + Y</span>
        <span class="asset-name">YouTube</span>
      </a>
      <a href="https://twitter.com" class="asset-card" data-key="t">
        <span class="asset-key">Alt + T</span>
        <span class="asset-name">Twitter</span>
      </a>
      <a href="https://gmail.com" class="asset-card" data-key="m">
        <span class="asset-key">Alt + M</span>
        <span class="asset-name">Mail</span>
      </a>
    </div>
  </div>

  <div class="hint-bar">Press ? for guide • Type / for commands</div>

  <script src="newtab.js"></script>
</body>
</html>
