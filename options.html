<!DOCTYPE html>
<html>
<head>
  <title>Vib Settings</title>
  <style>
    :root {
      --vib-bg: #0a0a0a;
      --vib-accent: #00ff88;
      --vib-border: rgba(255, 255, 255, 0.1);
      --vib-text: #ffffff;
      --vib-text-dim: #888;
    }
    body {
      background: var(--vib-bg);
      color: var(--vib-text);
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      padding: 60px 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 700px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 40px;
      letter-spacing: -1px;
    }
    .section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--vib-border);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
    }
    h2 { font-size: 18px; margin-top: 0; margin-bottom: 20px; color: var(--vib-accent); opacity: 0.9; }
    
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .setting-item:last-child { margin-bottom: 0; }
    .setting-info h3 { margin: 0; font-size: 15px; font-weight: 500; }
    .setting-info p { margin: 4px 0 0; font-size: 13px; color: var(--vib-text-dim); }
    
    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--vib-accent); }
    input:checked + .slider:before { transform: translateX(20px); }

    /* Shortcut Management */
    .shortcut-list { margin-top: 20px; }
    .shortcut-row {
      display: grid;
      grid-template-columns: 1fr 2fr auto;
      gap: 12px;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid transparent;
    }
    .shortcut-row:hover { border-color: rgba(255, 255, 255, 0.05); }
    
    .shortcut-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      outline: none;
    }
    .shortcut-input:focus { border-color: var(--vib-accent); }

    .btn-delete {
      background: rgba(255, 69, 58, 0.1);
      color: #ff453a;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(255, 69, 58, 0.2); }

    .btn-add {
      width: 100%;
      background: rgba(0, 255, 136, 0.1);
      color: var(--vib-accent);
      border: 1px dashed var(--vib-accent);
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-add:hover { background: rgba(0, 255, 136, 0.15); border-style: solid; }

    .save-status {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--vib-accent);
      color: #000;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vib Settings</h1>
    
    <div class="section">
      <h2>Preferences</h2>
      <div class="setting-item">
        <div class="setting-info">
          <h3>Universal Scrolling</h3>
          <p>Smooth momentum scrolling across all websites.</p>
        </div>
        <label class="switch">
          <input type="checkbox" id="scrollEnabled" checked>
          <span class="slider"></span>
        </label>
      </div>
      
      <div class="setting-item">
        <div class="setting-info">
          <h3>Auto-Skip YouTube Ads</h3>
          <p>Instantly bypass video advertisements.</p>
        </div>
        <label class="switch">
          <input type="checkbox" id="autoSkipEnabled" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <h2>Quick Jump Assets (New Tab)</h2>
      <p style="font-size: 13px; color: var(--vib-text-dim); margin-top: -10px; margin-bottom: 20px;">
        Assign up to 9 shortcuts. Access them using number keys (1-9) on the home page.
      </p>
      <div id="shortcut-list" class="shortcut-list">
        <!-- Shortcuts injected here -->
      </div>
      <button class="btn-add" id="add-shortcut-btn">+ Add New Asset</button>
    </div>

    <div id="status" class="save-status">Settings saved</div>
  </div>
  <script src="options.js"></script>
</body>
</html>
